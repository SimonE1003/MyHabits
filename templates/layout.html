<!DOCTYPE html>

<html lang="en" class="h-100">
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
        <title>MyHabits: {% block title %}{% endblock %}</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body class="d-flex flex-column h-100">
            <!--Navigation Bar-->
        <nav class="navbar navbar-dark bg-black navbar-expand-md">
            <div class="container-fluid">
            <!-- Brand (left side) -->
                <a class="navbar-brand ps-3" href="/">MyHabits</a>

                <!-- Toggle button (for mobile) -->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                
                <div class="collapse navbar-collapse" id="navbarNav">
                    {% if session["user_id"] %}
                        <ul class="navbar-nav me-auto mt-2">
                            <li class="nav-item active px-2">
                                <a class="nav-link" href="/today">Today</a>
                            </li>
                            <li class="nav-item active px-2">
                                <a class="nav-link" href="/set_habits">Set Habits</a>
                            </li>
                            <li class="nav-item active px-2">
                                <a class="nav-link" href="/info">Info</a>
                            </li>
                            <li class="nav-item active px-2">
                                <a class="nav-link" href="/now">Now</a>
                            </li>
                        </ul>
                        <ul class="navbar-nav ms-auto mt-2">
                            <li class="nav-item"><a class="nav-link" href="/logout">Log Out</a></li>
                        </ul>
                    {% else %}
                    <!-- Collapsible menu (right side) -->
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ms-auto">  <!-- "ms-auto" aligns right -->
                            <li class="nav-item active px-2">
                                <a class="nav-link" href="/register">Register</a>
                            </li>
                            <li class="nav-item px-2">
                                <a class="nav-link" href="/login">Log In</a>
                        </ul>
                    </div>
                    {% endif %}
                </div>
            </div>
        </nav>

        <main class="container py-5 text-center flex-grow-1">
            {% block main %}{% endblock %}
        </main>
        
        <footer class="bg-dark text-white py-2 mt-auto"> 
            <div class="container">
                <p class="text-center">Copyright &#169; Simon Wang</p>
            </div>
        </footer>
    </body>
</html>
